# Iceberg REST catalog variant of the test stack: adds a catalog server and
# points the worker at it (path-based tables stay the default without this file).
#
#   docker compose -f docker-compose.yml -f docker-compose.rest.yml up -d --build
#   EXAMPLE_REST=1 example/run.sh
services:
  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      CATALOG_WAREHOUSE: s3://warehouse/rest
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    ports:
      - "8181:8181"

  worker:
    depends_on:
      iceberg-rest:
        condition: service_started
    environment:
      MODAK_CATALOG_URI: http://iceberg-rest:8181
      MODAK_CATALOG_WAREHOUSE: s3://warehouse/rest
      MODAK_CATALOG_NAMESPACE: modak
