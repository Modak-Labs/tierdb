# Local Modak test stack: Postgres (pg_duckdb + modak extension), MinIO as the
# Iceberg warehouse, and the worker daemon. This is an experimentation harness,
# not a production topology — in production the workers point at your managed
# Postgres and real S3 via the same env vars.
services:
  postgres:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres
    environment:
      POSTGRES_PASSWORD: modak
      MODAK_S3_ENDPOINT: minio:9000
      MODAK_S3_ACCESS_KEY: minioadmin
      MODAK_S3_SECRET_KEY: minioadmin
      # Scoped read secret for the second warehouse (storage profile demo)
      MODAK_READ_SECRET_ANALYTICS: type=S3;key_id=analytics;secret=analytics-secret;endpoint=minio:9000;url_style=path;use_ssl=false;scope=s3://analytics/
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/warehouse &&
      mc mb --ignore-existing local/analytics &&
      (mc admin user add local analytics analytics-secret || true) &&
      printf '%s' '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":[\"s3:*\"],\"Resource\":[\"arn:aws:s3:::analytics\",\"arn:aws:s3:::analytics/*\"]}]}' > /tmp/analytics.json &&
      (mc admin policy create local analytics-rw /tmp/analytics.json || true) &&
      (mc admin policy attach local analytics-rw --user analytics ||
       mc admin policy attach local readwrite --user analytics || true)
      "

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      MODAK_PG_URL: jdbc:postgresql://postgres:5432/postgres
      MODAK_PG_USER: postgres
      MODAK_PG_PASSWORD: modak
      MODAK_WAREHOUSE: s3://warehouse
      MODAK_S3_ENDPOINT: http://minio:9000
      MODAK_S3_ACCESS_KEY: minioadmin
      MODAK_S3_SECRET_KEY: minioadmin
      MODAK_S3_SSL: "false"
      # Credential set for the 'analytics' storage profile (by reference)
      MODAK_CREDENTIALS_ANALYTICS: s3.access-key=analytics;s3.secret-key=analytics-secret
      MODAK_CYCLE_INTERVAL_SECONDS: "5"
      MODAK_TIERING_LAG: "0"
      MODAK_CONSOLE_PORT: "9090"
      MODAK_LOAD_TOKEN: "modak-example"
    ports:
      - "9090:9090"
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
