# Embedded worker mode overlay: the extension's supervisor runs the daemon
# inside the postgres container, no separate worker service.
#   docker compose -f docker-compose.yml -f docker-compose.embedded.yml up -d --build
services:
  postgres:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres
      target: embedded
    command:
      - "-c"
      - "modak.embedded_worker=on"
      - "-c"
      - "modak.worker_env=MODAK_S3_ENDPOINT=http://minio:9000;MODAK_CYCLE_INTERVAL_SECONDS=5;MODAK_TIERING_LAG=0;MODAK_CONSOLE_PORT=9090;MODAK_LOAD_TOKEN=modak-example"
    environment:
      MODAK_PG_USER: postgres
      MODAK_PG_PASSWORD: modak
      MODAK_WAREHOUSE: s3://warehouse
      MODAK_S3_ACCESS_KEY: minioadmin
      MODAK_S3_SECRET_KEY: minioadmin
      MODAK_S3_SSL: "false"
      MODAK_CREDENTIALS_ANALYTICS: s3.access-key=analytics;s3.secret-key=analytics-secret
    ports:
      - "9090:9090"
    depends_on:
      minio-init:
        condition: service_completed_successfully

  # CLI only (docker compose run worker ...), never started by up.
  worker:
    profiles: ["cli"]
    restart: "no"
